<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I'm Really Sorry</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --bg-success: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            --primary: #ff4b2b;
            --primary-hover: #ff416c;
            --text-main: #333;
            --text-muted: #666;
        }

        body {
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            /* Remove standard background transition to use the overlay method for smoother gradient fading */
        }

        /* Success background overlay for ultra-smooth gradient transition */
        .success-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-success);
            opacity: 0;
            z-index: 0;
            transition: opacity 1.5s ease-in-out;
            pointer-events: none;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 2.5rem 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08), 0 5px 15px rgba(0,0,0,0.03);
            text-align: center;
            max-width: 400px;
            width: 90%;
            position: relative;
            z-index: 10;
            /* Professional entrance animation */
            opacity: 0;
            transform: translateY(30px) scale(0.95);
            animation: cardEntrance 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes cardEntrance {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Wrapper to fade content easily */
        .card-content {
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .fade-out {
            opacity: 0;
            transform: scale(0.95);
        }

        .header-image {
            font-size: 80px;
            margin-bottom: 15px;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: inline-block;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1));
        }

        h1 {
            color: var(--text-main);
            margin-bottom: 10px;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 28px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        #yesBtn {
            background-color: var(--primary);
            color: white;
            position: relative;
            overflow: hidden;
        }

        #yesBtn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300%;
            height: 300%;
            background: rgba(255,255,255,0.2);
            transform: translate(-50%, -50%) scale(0);
            border-radius: 50%;
            transition: transform 0.5s ease;
        }

        #yesBtn:hover {
            transform: translateY(-3px);
            background-color: var(--primary-hover);
            box-shadow: 0 10px 25px rgba(255, 75, 43, 0.4);
        }

        #yesBtn:hover::after {
            transform: translate(-50%, -50%) scale(1);
        }

        #noBtn {
            background-color: #f1f3f5;
            color: var(--text-main);
            /* Upgraded physics for the dodge movement */
            transition: left 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), 
                        top 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                        transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                        box-shadow 0.3s ease;
        }

        #noBtn:hover {
            background-color: #e9ecef;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        /* Floating Hearts Animation Container */
        .hearts-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            overflow: hidden;
            display: none;
        }

        .heart {
            position: absolute;
            font-size: 24px;
            /* We use variables set by JS for mesmerizing organic movement */
            animation: floatUp 4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            opacity: 0;
            filter: drop-shadow(0 5px 5px rgba(255, 105, 180, 0.3));
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) translateX(0) scale(0) rotate(0deg);
                opacity: 0;
            }
            15% {
                opacity: 1;
            }
            50% {
                transform: translateY(40vh) translateX(calc(var(--tx) / 2)) scale(1.2) rotate(calc(var(--rot) / 2));
                opacity: 0.8;
            }
            100% {
                transform: translateY(-100px) translateX(var(--tx)) scale(1.5) rotate(var(--rot));
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="success-overlay" id="successOverlay"></div>

    <div class="hearts-container" id="heartsContainer"></div>

    <div class="card" id="mainCard">
        <div class="card-content" id="cardContent">
            <div class="header-image" id="emojiContainer">
                <span id="emoji">🥺</span>
            </div>
            <h1 id="title">I am so sorry!</h1>
            <p id="message">I know I messed up, but you mean the world to me. Can you find it in your heart to forgive me?</p>
            
            <div class="btn-group" id="btnGroup">
                <button id="yesBtn">Yes, I forgive you</button>
                <button id="noBtn">No</button>
            </div>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const emoji = document.getElementById('emoji');
        const emojiContainer = document.getElementById('emojiContainer');
        const title = document.getElementById('title');
        const message = document.getElementById('message');
        const btnGroup = document.getElementById('btnGroup');
        const cardContent = document.getElementById('cardContent');
        const heartsContainer = document.getElementById('heartsContainer');
        const successOverlay = document.getElementById('successOverlay');

        // Function to make the No button run away with physics
        function dodgeButton() {
            noBtn.style.position = 'fixed';
            
            const safeWidth = window.innerWidth - noBtn.offsetWidth - 30;
            const safeHeight = window.innerHeight - noBtn.offsetHeight - 30;
            
            const randomX = Math.max(15, Math.floor(Math.random() * safeWidth));
            const randomY = Math.max(15, Math.floor(Math.random() * safeHeight));
            
            // Add a slight rotation for a tumbling effect
            const randomRot = Math.floor(Math.random() * 40) - 20;

            noBtn.style.left = `${randomX}px`;
            noBtn.style.top = `${randomY}px`;
            noBtn.style.transform = `rotate(${randomRot}deg)`;

            // Worried emoji bounce
            emoji.innerText = '😭';
            emojiContainer.style.transform = 'scale(1.2) rotate(-5deg)';
            setTimeout(() => {
                emojiContainer.style.transform = 'scale(1) rotate(0deg)';
            }, 300);
        }

        noBtn.addEventListener('mouseover', dodgeButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); 
            dodgeButton();
        });

        // Function to create dynamically drifting hearts
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            
            // Mix up the heart styles slightly
            const emojis = ['💖', '💕', '💗', '💓', '✨'];
            heart.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            
            // Start position
            heart.style.left = Math.random() * 100 + 'vw';
            
            // Set dynamic CSS variables for the mesmerizing path
            const translateX = (Math.random() * 200 - 100) + 'px'; // Drift left or right
            const rotation = (Math.random() * 360 - 180) + 'deg'; // Spin amount
            
            heart.style.setProperty('--tx', translateX);
            heart.style.setProperty('--rot', rotation);
            
            // Randomize timing and size
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
            heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
            
            heartsContainer.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 6000); // Wait longer than animation to safely remove
        }

        // Logic for when they click "Yes"
        yesBtn.addEventListener('click', () => {
            // 1. Fade out current content gracefully
            cardContent.classList.add('fade-out');
            
            // 2. Wait for fade out, swap content, then fade back in
            setTimeout(() => {
                emoji.innerText = '🥰';
                title.innerText = 'Thank You!';
                message.innerHTML = "You're the absolute best.<br>I promise to make it up to you! ❤️";
                
                btnGroup.style.display = 'none'; // Hide buttons
                
                // Fade back in
                cardContent.classList.remove('fade-out');
            }, 400); // Matches CSS transition time
            
            // 3. Smooth background transition
            successOverlay.style.opacity = '1';
            
            // 4. Start mesmerizing heart cascade
            heartsContainer.style.display = 'block';
            
            // Initial burst
            for(let i = 0; i < 40; i++) {
                setTimeout(createHeart, i * 60);
            }
            
            // Ongoing gentle float
            setInterval(createHeart, 300);
        });
    </script>
</body>
</html>
